<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Lab Pro - Marco Fasoglio</title>
    
    <!-- Meta Tag per Social e SEO -->
    <meta name="description" content="Calcolatore parametri laser professionale. Creato da Marco Fasoglio per Mimosa House.">
    <meta name="author" content="Marco Fasoglio">
    <meta name="theme-color" content="#0a0f1d">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg-main: #0a0f1d;
            --card-bg: rgba(21, 28, 46, 0.8);
            --text-main: #f1f5f9;
            --accent: #3b82f6;
            --input-bg: #0f172a;
            --border: rgba(255,255,255,0.08);
        }

        body.light-mode {
            --bg-main: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --input-bg: #f1f5f9;
            --border: rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            transition: all 0.3s ease;
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.05), transparent);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .compact-input { 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 0.5rem; 
            padding: 0.5rem 0.75rem; 
            color: var(--text-main);
            font-size: 0.85em;
            font-weight: 700;
        }

        .test-cell { 
            aspect-ratio: 1.2; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.7em;
            font-weight: 800;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        .is-cut { border: 2px solid #22c55e !important; box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }

        .software-btn { padding: 6px 16px; border-radius: 0.5rem; font-weight: 800; font-size: 0.75em; cursor: pointer; }
        .active-lb { background: #3b82f6; color: white; }
        .active-grbl { background: #8b5cf6; color: white; }

        /* Report Hidden Area */
        #print-wrapper { position: absolute; top: -10000px; left: -10000px; width: 800px; }
        #print-area { width: 800px; background: white !important; color: black !important; padding: 50px; }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="p-3 md:p-6">
    <div class="max-w-5xl mx-auto space-y-4">
        
        <!-- HEADER -->
        <header class="flex flex-wrap items-center justify-between gap-4 glass p-4 rounded-2xl">
            <div class="flex items-center gap-5">
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tighter leading-none">
                        Laser <span class="text-blue-500">Lab</span>
                    </h1>
                    <span class="text-[10px] font-bold text-blue-400 italic">by Marco Fasoglio</span>
                </div>
                <div class="flex items-center gap-4 border-l border-white/10 pl-4">
                    <select id="laserModel" class="compact-input">
                        <option value="5.5">5.5W</option>
                        <option value="10">10W</option>
                        <option value="20">20W</option>
                        <option value="33">33W</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5">🌓</button>
                <div class="flex bg-slate-900/50 p-1 rounded-xl border border-white/5">
                    <button id="btnLightBurn" class="software-btn active-lb">LB</button>
                    <button id="btnGRBL" class="software-btn text-slate-500">GRBL</button>
                </div>
            </div>
        </header>

        <!-- CONTROLLI -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <section class="lg:col-span-2 glass p-6 rounded-2xl space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">Materiale</label>
                        <select id="material" class="compact-input w-full py-3"></select>
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Spessore</label>
                            <span id="slider-val" class="text-[11px] font-black text-blue-500 mono">---</span>
                        </div>
                        <input type="range" id="thickSlider" min="0.01" max="10.00" step="0.01" value="0.25" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                </div>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="airassist" checked class="w-5 h-5 accent-blue-500">
                    <span class="text-[10px] font-black text-slate-400 uppercase">Air Assist Attivo</span>
                </label>
            </section>

            <section class="glass p-6 rounded-2xl text-center flex flex-col justify-center">
                <div id="density-val" class="text-3xl font-black text-blue-500 mono">0.00</div>
                <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Densità (ρ)</div>
            </section>
        </div>

        <!-- DASHBOARD -->
        <main class="space-y-4">
            <div id="capture-area" class="glass p-6 rounded-3xl shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="p-4 bg-green-500/10 border border-green-500/20 rounded-2xl">
                        <div class="text-[9px] font-black text-green-500 uppercase">Taglio Ottimale</div>
                        <div id="best-cut" class="text-lg font-black mono text-white">---</div>
                    </div>
                    <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl">
                        <div class="text-[9px] font-black text-blue-400 uppercase">Cordonatura</div>
                        <div id="best-score" class="text-lg font-black mono text-white">---</div>
                    </div>
                    <div class="p-4 bg-orange-500/10 border border-orange-500/20 rounded-2xl">
                        <div class="text-[9px] font-black text-orange-400 uppercase">Incisione</div>
                        <div id="best-fill" class="text-lg font-black mono text-white">---</div>
                    </div>
                </div>
                <div id="test-matrix" class="space-y-3"></div>
            </div>

            <!-- BOTTONI -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <button onclick="exportSVG()" class="bg-orange-600 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest">🔥 SVG</button>
                <button id="btn-report" onclick="downloadCapture('A4')" class="bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest">🖨️ Report A4</button>
                <button id="btn-screenshot" onclick="downloadCapture('DASH')" class="bg-slate-800 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest">📸 Salva PNG</button>
            </div>
        </main>
        
        <footer class="text-center py-6 opacity-40 text-[9px] font-black uppercase tracking-[0.3em]">
            Mimosa House © 2026 - Torino
        </footer>
    </div>

    <!-- AREA REPORT INVISIBILE -->
    <div id="print-wrapper">
        <div id="print-area">
            <div style="display: flex; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                <div>
                    <h1 style="font-size: 28px; font-weight: 900; margin: 0;">LASER LAB PRO</h1>
                    <p style="font-size: 12px; color: #3b82f6; font-weight: 800; margin: 0;">SCHEDA TECNICA MIMOSA HOUSE</p>
                </div>
                <div style="text-align: right; font-size: 10px;">Progettista: Marco Fasoglio<br>Via Chiesa della Salute 69, Torino</div>
            </div>
            <div id="print-details" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;"></div>
            <div id="print-matrix-target" style="background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;"></div>
            <div style="margin-top: 30px; font-size: 10px; color: #94a3b8; display: flex; justify-content: space-between;">
                <span>Data: <span id="print-date"></span></span>
                <span>Generato con Laser Lab v1.0</span>
            </div>
        </div>
    </div>

    <script>
        const materials = {
            f4: { name: "Fabriano F4 (220g)", gsm: 220, density: 1.15, type: 'paper' },
            f2: { name: "Fabriano F2 (110g)", gsm: 110, density: 1.05, type: 'paper' },
            tec6: { name: "Fabriano Tecnico 6 (240g)", gsm: 240, density: 1.25, type: 'paper' },
            c_onda: { name: "Cartone Ondulato", gsm: 400, density: 0.35, type: 'wood' },
            mdf: { name: "MDF / HDF", gsm: 0, density: 1.45, type: 'wood' },
            multi: { name: "Multistrato Pioppo", gsm: 0, density: 1.05, type: 'wood' }
        };

        let currentSoftware = 'LightBurn';
        let calculatedParams = { cut: 0, score: 0, fill: 0 };

        const dom = {
            mat: document.getElementById('material'),
            slider: document.getElementById('thickSlider'),
            sliderVal: document.getElementById('slider-val'),
            air: document.getElementById('airassist'),
            laser: document.getElementById('laserModel'),
            matrix: document.getElementById('test-matrix'),
            bestCut: document.getElementById('best-cut'),
            bestScore: document.getElementById('best-score'),
            bestFill: document.getElementById('best-fill'),
            densVal: document.getElementById('density-val')
        };

        function populate() {
            Object.keys(materials).forEach(k => {
                const o = document.createElement('option'); o.value = k; o.textContent = materials[k].name;
                dom.mat.appendChild(o);
            });
            dom.mat.value = "f4";
            updateFromMaterial();
        }

        function updateFromMaterial() {
            const mat = materials[dom.mat.value];
            if(mat.type === 'paper') dom.slider.value = (mat.gsm / (mat.density * 1000)).toFixed(2);
            else dom.slider.value = 3.00;
            update();
        }

        function update() {
            const mat = materials[dom.mat.value];
            const laserP = parseFloat(dom.laser.value);
            const thick = parseFloat(dom.slider.value);
            
            dom.sliderVal.innerText = `${thick.toFixed(2)} MM`;
            dom.densVal.innerText = mat.density.toFixed(2);

            let baseRatio = laserP / 10;
            let cutS = (1750 * baseRatio) / (Math.pow(thick, 1.35) * mat.density);
            if(!dom.air.checked) cutS *= 0.55;

            calculatedParams.cut = Math.min(4000, Math.max(80, cutS));
            calculatedParams.score = Math.min(4000, calculatedParams.cut * 3.2);
            calculatedParams.fill = Math.min(4000, 3200 * baseRatio);

            dom.bestCut.innerText = getParam(calculatedParams.cut, 85);
            dom.bestScore.innerText = getParam(calculatedParams.score, 18);
            dom.bestFill.innerText = getParam(calculatedParams.fill, 22);

            renderMatrix(dom.matrix, calculatedParams.cut, calculatedParams.score, calculatedParams.fill, false);
        }

        function getParam(s, p) {
            const speed = Math.round(s);
            return currentSoftware === 'GRBL' ? `F${speed} S${p * 10}` : `${speed} mm/m @ ${p}%`;
        }

        function renderMatrix(target, cutS, scoreS, fillS, isPrint) {
            target.innerHTML = '';
            const powers = [15, 30, 45, 60, 80, 100];
            const rows = [{ n: 'TAGLIO', s: cutS, c: '34, 197, 94' }, { n: 'CORDON.', s: scoreS, c: '59, 130, 246' }, { n: 'INCIS.', s: fillS, c: '249, 115, 22' }];

            rows.forEach(r => {
                const div = document.createElement('div');
                div.style.display = 'grid'; div.style.gridTemplateColumns = 'repeat(8, 1fr)'; div.style.gap = '8px'; div.style.marginBottom = '8px';
                div.innerHTML = `<div style="grid-column: span 2; font-size: 8px; font-weight: 900; color:${isPrint?'#000':'#94a3b8'}">${r.n}<br>${Math.round(r.s)}</div>`;
                powers.forEach(p => {
                    div.innerHTML += `<div class="test-cell" style="background:rgba(${r.c}, ${p/100}); aspect-ratio:1.2; border-radius:4px; display:flex; align-items:center; justify-content:center; color:white; font-size:9px; font-weight:900;">${p}%</div>`;
                });
                target.appendChild(div);
            });
        }

        async function downloadCapture(mode) {
            const btn = document.getElementById(mode === 'A4' ? 'btn-report' : 'btn-screenshot');
            btn.disabled = true;
            const mat = materials[dom.mat.value];

            if (mode === 'A4') {
                document.getElementById('print-date').innerText = new Date().toLocaleString();
                document.getElementById('print-details').innerHTML = `
                    <div style="border-left:4px solid #3b82f6; padding-left:10px;"><strong>MAT:</strong> ${mat.name}<br><strong>THICK:</strong> ${dom.slider.value} mm</div>
                    <div style="border-left:4px solid #3b82f6; padding-left:10px;"><strong>LASER:</strong> ${dom.laser.value}W<br><strong>AIR:</strong> ${dom.air.checked?'SI':'NO'}</div>
                `;
                renderMatrix(document.getElementById('print-matrix-target'), calculatedParams.cut, calculatedParams.score, calculatedParams.fill, true);
            }

            await new Promise(r => setTimeout(r, 400));
            const canvas = await html2canvas(mode === 'A4' ? document.getElementById('print-area') : document.getElementById('capture-area'), { scale: 2 });
            
            canvas.toBlob((blob) => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `LaserLab_${mode}.png`;
                link.click();
            });
            btn.disabled = false;
        }

        function exportSVG() {
            const mat = materials[dom.mat.value];
            let svg = `<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg" style="background:white">`;
            svg += `<text x="20" y="30" font-family="Arial" font-size="12" font-weight="bold">${mat.name} (${dom.laser.value}W)</text>`;
            [ { n: 'TAGLIO', s: calculatedParams.cut, c: '#166534' }, { n: 'SCORE', s: calculatedParams.score, c: '#1e40af' }, { n: 'FILL', s: calculatedParams.fill, c: '#9a3412' } ].forEach((r, i) => {
                const y = 60 + i * 60;
                svg += `<text x="20" y="${y+25}" font-family="monospace" font-size="10" fill="${r.c}">${r.n} F${Math.round(r.s)}</text>`;
                [15,30,45,60,80,100].forEach((p, j) => {
                    svg += `<rect x="${100+j*45}" y="${y}" width="35" height="35" fill="none" stroke="${r.c}" stroke-width="1"/><text x="${105+j*45}" y="${y+20}" font-size="8" fill="${r.c}">${p}%</text>`;
                });
            });
            svg += `</svg>`;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
            link.download = `LaserLab_Vector.svg`;
            link.click();
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        dom.mat.addEventListener('input', updateFromMaterial);
        [dom.slider, dom.air, dom.laser].forEach(el => el.addEventListener('input', update));
        window.onload = populate;
    </script>
</body>
</html>
